apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: training-set
  Namespace: distdgl
spec:
  replicas: 4
  serviceName: training-service
  selector:
    matchLabels:
      app: graph-train
  template:
    metadata:
      labels:
        app: graph-train
    spec:
      containers:
      - name: graph-train-container
        image: meongju0o0/distdgl-training:latest
        volumeMounts:
        - name: graph-partition-pvc
          mountPath: /workspace
      volumes:
      - name: graph-partition-pvc
        persistentVolumeClaim:
          claimName: graph-partition-pvc
  volumeClaimTemplates:
  - metadata:
      name: graph-partition-pvc
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 20Gi
